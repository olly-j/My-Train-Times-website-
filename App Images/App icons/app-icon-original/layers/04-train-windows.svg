<?xml version="1.0" encoding="UTF-8"?>
<!-- TubeBoard layer 04 — windscreen: one dark-blue windscreen split by a centre divider
     (two panes) with a clean double glass glint -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="winGrad" x1="0" y1="366" x2="0" y2="494" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B3654"/>
      <stop offset="1" stop-color="#091826"/>
    </linearGradient>
  </defs>
  <g id="04-train-windows">
    <rect x="348" y="366" width="156" height="128" rx="26" fill="url(#winGrad)"/>
    <rect x="520" y="366" width="156" height="128" rx="26" fill="url(#winGrad)"/>
    <!-- clean double glass glint (light from upper-left) -->
    <polygon points="388,374 414,374 382,486 356,486" fill="#FFFFFF" fill-opacity="0.18"/>
    <polygon points="426,374 438,374 406,486 394,486" fill="#FFFFFF" fill-opacity="0.16"/>
  </g>
</svg>
