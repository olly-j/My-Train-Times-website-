<?xml version="1.0" encoding="UTF-8"?>
<!-- TubeBoard layer 05 — warm accents: abstract amber "arrivals" strip (destination-panel
     position, no text) high under the windscreen; two small oval headlamps low by the bumper -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="lampGrad" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#FFEAB6"/>
      <stop offset="0.45" stop-color="#FFB84F"/>
      <stop offset="1" stop-color="#EE7E16"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFB24C" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#FFB24C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boardGrad" x1="0" y1="549" x2="0" y2="571" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#FF9F22"/>
    </linearGradient>
    <radialGradient id="boardGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFC152" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFC152" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="05-train-lights">
    <ellipse cx="512" cy="560" rx="80" ry="30" fill="url(#boardGlow)"/>
    <rect x="452" y="549" width="120" height="22" rx="11" fill="url(#boardGrad)"/>
    <ellipse cx="404" cy="694" rx="48" ry="40" fill="url(#lampGlow)"/>
    <ellipse cx="620" cy="694" rx="48" ry="40" fill="url(#lampGlow)"/>
    <ellipse cx="404" cy="694" rx="27" ry="22" fill="url(#lampGrad)"/>
    <ellipse cx="620" cy="694" rx="27" ry="22" fill="url(#lampGrad)"/>
  </g>
</svg>
