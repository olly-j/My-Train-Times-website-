<?xml version="1.0" encoding="UTF-8"?>
<!--
  TubeBoard — "Minimal Tube Glass v2" master app icon
  1024 x 1024 full-bleed square (no pre-rounded corners / no baked mask:
  Icon Composer applies the rounded-rectangle mask + Liquid Glass material).
  Each <g> below maps 1:1 to a numbered layer file in ./layers/.
  NOTE: 07-depth-shadow is intentionally painted *beneath* the train body so
  the master composite reads correctly; in Icon Composer place that layer
  directly below 03-train-body (or rely on the material's automatic shadow).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024"
     viewBox="0 0 1024 1024" role="img" aria-label="TubeBoard app icon">
  <defs>
    <!-- 00 background: graphite-navy -> near black -->
    <linearGradient id="bgBase" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E2E3B"/>
      <stop offset="0.5" stop-color="#0B141E"/>
      <stop offset="1" stop-color="#04070C"/>
    </linearGradient>
    <!-- 01 glass glow (subtle, cool) -->
    <radialGradient id="glassGlow" cx="512" cy="452" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6FA0D8" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#5B86BC" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#5B86BC" stop-opacity="0"/>
    </radialGradient>
    <!-- 02 accent ribbons (brighter; transparent outer ends) -->
    <linearGradient id="arcRed" x1="150" y1="0" x2="874" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5392E" stop-opacity="0"/>
      <stop offset="0.14" stop-color="#F5392E" stop-opacity="0.72"/>
      <stop offset="0.5" stop-color="#F5392E" stop-opacity="0.56"/>
      <stop offset="0.86" stop-color="#F5392E" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#F5392E" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arcGreen" x1="150" y1="0" x2="874" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2BBE63" stop-opacity="0"/>
      <stop offset="0.14" stop-color="#2BBE63" stop-opacity="0.72"/>
      <stop offset="0.5" stop-color="#2BBE63" stop-opacity="0.56"/>
      <stop offset="0.86" stop-color="#2BBE63" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#2BBE63" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arcAmber" x1="150" y1="0" x2="874" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC233" stop-opacity="0"/>
      <stop offset="0.14" stop-color="#FFC233" stop-opacity="0.72"/>
      <stop offset="0.5" stop-color="#FFC233" stop-opacity="0.56"/>
      <stop offset="0.86" stop-color="#FFC233" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#FFC233" stop-opacity="0"/>
    </linearGradient>
    <!-- 07 shadow -->
    <radialGradient id="shadowHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="0.84" stop-color="#000000" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadowGround" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#000000" stop-opacity="0.55"/>
      <stop offset="0.65" stop-color="#000000" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- 03 train body + bumper -->
    <linearGradient id="bodyGrad" x1="0" y1="296" x2="0" y2="772" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFEFF"/>
      <stop offset="0.45" stop-color="#E7EEF4"/>
      <stop offset="1" stop-color="#B9C6D3"/>
    </linearGradient>
    <linearGradient id="bumperGrad" x1="0" y1="726" x2="0" y2="752" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C4CFDA"/>
      <stop offset="1" stop-color="#A4B2BF"/>
    </linearGradient>
    <!-- 04 windscreen -->
    <linearGradient id="winGrad" x1="0" y1="366" x2="0" y2="494" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B3654"/>
      <stop offset="1" stop-color="#091826"/>
    </linearGradient>
    <!-- 05 lamps + arrivals strip -->
    <radialGradient id="lampGrad" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#FFEAB6"/>
      <stop offset="0.45" stop-color="#FFB84F"/>
      <stop offset="1" stop-color="#EE7E16"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFB24C" stop-opacity="0.60"/>
      <stop offset="1" stop-color="#FFB24C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boardGrad" x1="0" y1="549" x2="0" y2="571" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE08A"/>
      <stop offset="1" stop-color="#FF9F22"/>
    </linearGradient>
    <radialGradient id="boardGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFC152" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFC152" stop-opacity="0"/>
    </radialGradient>
    <!-- 06 specular -->
    <radialGradient id="specGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ===== 00 background base ===== -->
  <g id="00-background-base">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bgBase)"/>
  </g>

  <!-- ===== 01 background glass ===== -->
  <g id="01-background-glass">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#glassGlow)"/>
  </g>

  <!-- ===== 02 colour accent field (three tube-line glass ribbons) ===== -->
  <g id="02-colour-accent-field" fill="none" stroke-linecap="round" stroke-width="36">
    <path d="M150 566 Q512 510 874 566" stroke="url(#arcRed)"/>
    <path d="M150 612 Q512 556 874 612" stroke="url(#arcGreen)"/>
    <path d="M150 658 Q512 602 874 658" stroke="url(#arcAmber)"/>
  </g>

  <!-- ===== 07 depth shadow (painted beneath train; see header note) ===== -->
  <g id="07-depth-shadow">
    <ellipse cx="512" cy="536" rx="240" ry="272" fill="url(#shadowHalo)"/>
    <ellipse cx="512" cy="766" rx="236" ry="44" fill="url(#shadowGround)"/>
  </g>

  <!-- ===== 03 train body (domed roof, solid flatter base + bumper seam) ===== -->
  <g id="03-train-body">
    <path d="M300 392 Q300 296 396 296 L628 296 Q724 296 724 392 L724 732 Q724 772 684 772 L340 772 Q300 772 300 732 Z" fill="url(#bodyGrad)"/>
    <rect x="344" y="726" width="336" height="26" rx="13" fill="url(#bumperGrad)"/>
  </g>

  <!-- ===== 04 train windows (one windscreen split by a centre divider) ===== -->
  <g id="04-train-windows">
    <rect x="348" y="366" width="156" height="128" rx="26" fill="url(#winGrad)"/>
    <rect x="520" y="366" width="156" height="128" rx="26" fill="url(#winGrad)"/>
    <!-- clean double glass glint (light from upper-left) -->
    <polygon points="388,374 414,374 382,486 356,486" fill="#FFFFFF" fill-opacity="0.18"/>
    <polygon points="426,374 438,374 406,486 394,486" fill="#FFFFFF" fill-opacity="0.16"/>
  </g>

  <!-- ===== 05 train lights (abstract amber arrivals strip high; two oval headlamps low) ===== -->
  <g id="05-train-lights">
    <ellipse cx="512" cy="560" rx="80" ry="30" fill="url(#boardGlow)"/>
    <rect x="452" y="549" width="120" height="22" rx="11" fill="url(#boardGrad)"/>
    <ellipse cx="404" cy="694" rx="48" ry="40" fill="url(#lampGlow)"/>
    <ellipse cx="620" cy="694" rx="48" ry="40" fill="url(#lampGlow)"/>
    <ellipse cx="404" cy="694" rx="27" ry="22" fill="url(#lampGrad)"/>
    <ellipse cx="620" cy="694" rx="27" ry="22" fill="url(#lampGrad)"/>
  </g>

  <!-- ===== 06 foreground specular (gentle glass sheen) ===== -->
  <g id="06-foreground-specular">
    <g transform="rotate(-22 380 300)">
      <ellipse cx="380" cy="300" rx="360" ry="210" fill="url(#specGrad)"/>
    </g>
  </g>
</svg>
