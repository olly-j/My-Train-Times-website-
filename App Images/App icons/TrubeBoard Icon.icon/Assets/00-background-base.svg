<?xml version="1.0" encoding="UTF-8"?>
<!-- TubeBoard layer 00 — background base: graphite-navy -> near black, full bleed -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E2E3B"/>
      <stop offset="0.5" stop-color="#0B141E"/>
      <stop offset="1" stop-color="#04070C"/>
    </linearGradient>
  </defs>
  <g id="00-background-base">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bgBase)"/>
  </g>
</svg>
